name: Build AutoSubSync AppImage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    # Using an older base (Stretch) to ensure GLIBC compatibility with Debian 10
    container: python:3.10-slim-stretch

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git wget curl build-essential libgl1-mesa-dev libxkbcommon-x11-0 \
          libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
          libxcb-xinerama0 libxcb-xinput0 libxcb-randr0 libxcb-shape0 binutils

      - name: Clone and Install Source
        run: |
          git clone https://github.com/v8952/AutoSubSync.git /build
          cd /build
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pyinstaller static-ffmpeg

      - name: Build static alass
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add x86_64-unknown-linux-musl
          git clone --depth 1 https://github.com/kaegi/alass.git /build/alass-src
          cd /build/alass-src
          cargo build --release --target x86_64-unknown-linux-musl
          mkdir -p /build/src/main/resources/alass-bin
          cp target/x86_64-unknown-linux-musl/release/alass /build/src/main/resources/alass-bin/alass
          chmod +x /build/src/main/resources/alass-bin/alass

      - name: Prepare ffmpeg
        run: |
          mkdir -p /build/src/main/resources/ffmpeg-bin
          python3 << 'EOF'
          import static_ffmpeg, shutil, os, sys
          static_ffmpeg.add_paths()
          bin_dir = "/usr/local/lib/python3.10/site-packages/static_ffmpeg/bin/linux"
          dest = "/build/src/main/resources/ffmpeg-bin"
          for f in ["ffmpeg", "ffprobe"]:
              src = os.path.join(bin_dir, f)
              if os.path.exists(src):
                  shutil.copy2(src, os.path.join(dest, f))
          EOF
          chmod +x /build/src/main/resources/ffmpeg-bin/*

      - name: Run PyInstaller
        run: |
          cd /build/src
          pyinstaller --noconfirm --onedir --windowed \
          --add-data "main/resources:resources" \
          main/main.py --name AutoSubSync

      - name: Create AppDir
        run: |
          DIST_DIR=$(find /build/src/dist -maxdepth 1 -type d ! -path /build/src/dist | head -1)
          mkdir -p /build/AppDir
          cp -a "$DIST_DIR"/. /build/AppDir/
          
          # Create Desktop file
          printf "[Desktop Entry]\nType=Application\nName=AutoSubSync\nExec=AutoSubSync\nIcon=autosubsync\nCategories=Utility;\n" > /build/AppDir/autosubsync.desktop
          touch /build/AppDir/autosubsync.png
          
          # Create a bulletproof AppRun script using printf (no hidden characters)
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "${HERE}/AutoSubSync" "$@"\n' > /build/AppDir/AppRun
          chmod +x /build/AppDir/AppRun

      - name: Package AppImage
        run: |
          cd /build
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          # Force export of ARCH and build
          export ARCH=x86_64
          ./appimagetool --appimage-extract
          ./squashfs-root/AppRun /build/AppDir /build/AutoSubSync-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSubSync-Linux
          path: /build/AutoSubSync-x86_64.AppImage
